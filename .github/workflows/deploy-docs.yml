name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build docs
        run: bun run --filter docs build
        env:
          GITHUB_PAGES: true

      - name: Prepare for GitHub Pages
        run: |
          cd apps/docs/.output/public
          touch .nojekyll
          cp _shell.html 404.html
          [ -f index.html ] || cp _shell.html index.html
          # Fix TanStack static server function cache paths for subpath deployment
          find assets -name '*.js' -exec sed -i 's|/__tsr/|/AgentManager/__tsr/|g' {} +

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/.output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
